services:
  - type: web
    name: finance-kids-rest
    runtime: python
    buildCommand: pip install -r finance_kids_api/requirements.txt
    startCommand: python finance_kids_api/rest/rest_server.py
    envVars:
      - key: PORT
        value: 5000

  - type: web
    name: finance-kids-bridge
    runtime: python
    buildCommand: pip install -r finance_kids_api/requirements.txt && cd finance_kids_api/grpc && python -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. finance_kids.proto
    startCommand: python finance_kids_api/grpc/grpc_bridge.py
    envVars:
      - key: PORT
        value: 5001

  - type: web
    name: finance-kids-grpc
    runtime: python
    buildCommand: pip install -r finance_kids_api/requirements.txt && cd finance_kids_api/grpc && python -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. finance_kids.proto
    startCommand: python finance_kids_api/grpc/grpc_server.py
    envVars:
      - key: PORT
        value: 50051
